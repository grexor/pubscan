<IfModule mod_ssl.c>
        <VirtualHost *:443>
                ServerName pubscan.org
		ServerAlias www.pubscan.org
                ServerAdmin gregor.rot@gmail.com
                ServerSignature Off
                ErrorLog ${APACHE_LOG_DIR}/pubscanorg_error.ssl.log
                CustomLog ${APACHE_LOG_DIR}/pubscanorg_console.ssl.log combined

                RewriteEngine On
                RewriteRule ^/([^/\.]+)/?$ http://127.0.0.1:8008/index.html?center=$1 [QSA,P,L]

                ProxyPreserveHost On
                ProxyPass        /  http://127.0.0.1:8008/
                ProxyPassReverse /  http://127.0.0.1:8008/

                SSLEngine on
                SSLCertificateFile    /etc/letsencrypt/live/pubscan.org/fullchain.pem
                SSLCertificateKeyFile /etc/letsencrypt/live/pubscan.org/privkey.pem
                Include /etc/letsencrypt/options-ssl-apache.conf
        </VirtualHost>
</IfModule>
