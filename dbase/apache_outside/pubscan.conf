<VirtualHost *:80>
        ServerName pubscan.expressrna.org
        ServerAdmin gregor.rot@gmail.com
        ServerSignature Off
        ErrorLog ${APACHE_LOG_DIR}/pubscan_error.log
        CustomLog ${APACHE_LOG_DIR}/pubscan_console.log combined

        ProxyPreserveHost On
        ProxyPass        /  http://127.0.0.1:8007/
        ProxyPassReverse /  http://127.0.0.1:8007/

        RewriteEngine on
        RewriteCond %{SERVER_NAME} =pubscan.expressrna.org
        RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
