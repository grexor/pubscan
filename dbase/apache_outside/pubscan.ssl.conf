<IfModule mod_ssl.c>
        <VirtualHost _default_:443>
                ServerName pubscan.expressrna.org
                ServerAdmin gregor.rot@gmail.com
                ServerSignature Off
                ErrorLog ${APACHE_LOG_DIR}/pubscan_error.ssl.log
                CustomLog ${APACHE_LOG_DIR}/pubscan_console.ssl.log combined

                RewriteEngine On
                RewriteRule ^/([^/]+)/?$ http://127.0.0.1:8007/index.html?center=$1 [QSA,P,L]

                ProxyPreserveHost On
                ProxyPass        /  http://127.0.0.1:8007/
                ProxyPassReverse /  http://127.0.0.1:8007/

                SSLEngine on
                SSLCertificateFile    /etc/letsencrypt/live/pubscan.expressrna.org/fullchain.pem
                SSLCertificateKeyFile /etc/letsencrypt/live/pubscan.expressrna.org/privkey.pem
                Include /etc/letsencrypt/options-ssl-apache.conf
        </VirtualHost>
</IfModule>
